<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
</helmet>
<header style="display:flex; align-items:center; justify-content:space-between; gap:32px; padding:20px 48px; background:#fffdf7; border-bottom:1px solid rgba(20,30,50,0.12); font-family:'Archivo',sans-serif; position:relative;">
  <a href="Inicio.dc.html" style="display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit;">
    <span style="display:inline-block; width:34px; height:34px; border:1.5px solid #0e1c30; position:relative; flex-shrink:0;">
      <span style="position:absolute; inset:6px; border:1px solid #9b7a3a;"></span>
    </span>
    <span style="display:flex; flex-direction:column; line-height:1;">
      <span style="font-family:'Spectral',serif; font-weight:600; font-size:18px; letter-spacing:0.14em; color:#0e1c30; text-transform:uppercase;">Mendoza Cárdenas</span>
      <span style="font-size:9.5px; letter-spacing:0.42em; color:#9b7a3a; text-transform:uppercase; margin-top:5px;">Abogados · Lima</span>
    </span>
  </a>
  <nav style="display:flex; align-items:center; gap:30px;">
    <sc-for list="{{ links }}" as="link" hint-placeholder-count="5">
      <a href="{{ link.href }}" style="{{ link.style }}" style-hover="{{ link.hoverStyle }}">{{ link.label }}</a>
    </sc-for>
    <a href="Contacto.dc.html" style="font-size:12px; letter-spacing:0.12em; text-transform:uppercase; text-decoration:none; color:#fffdf7; background:#0e1c30; padding:11px 20px; border:1px solid #0e1c30;" style-hover="background:#9b7a3a; border-color:#9b7a3a;">Contacto</a>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:80},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;areas&quot;,&quot;equipo&quot;,&quot;nosotros&quot;,&quot;blog&quot;],&quot;default&quot;:&quot;inicio&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'inicio';
    const defs = [
      { key: 'inicio',   label: 'Inicio',            href: 'Inicio.dc.html' },
      { key: 'areas',    label: 'Áreas de práctica', href: 'Areas.dc.html' },
      { key: 'equipo',   label: 'Equipo',            href: 'Equipo.dc.html' },
      { key: 'nosotros', label: 'Nosotros',          href: 'Nosotros.dc.html' },
      { key: 'blog',     label: 'Blog',              href: 'Blog.dc.html' },
    ];
    const links = defs.map(d => {
      const isActive = d.key === active;
      const base = "font-size:12.5px; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; padding-bottom:3px; transition:color .2s;";
      return {
        ...d,
        style: base + (isActive
          ? " color:#0e1c30; border-bottom:1.5px solid #9b7a3a; font-weight:500;"
          : " color:#5d6b7a; border-bottom:1.5px solid transparent;"),
        hoverStyle: "color:#0e1c30;",
      };
    });
    return { links };
  }
}
</script>
</body>
</html>
