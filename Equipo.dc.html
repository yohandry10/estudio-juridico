<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
  <style>body{margin:0;background:#f5f1e8;} *::selection{background:#9b7a3a;color:#fff;}</style>
</helmet>
<div style="background:#f5f1e8; font-family:'Spectral',serif; color:#1b2433;">
  <dc-import name="SiteHeader" active="equipo" hint-size="100%,80px"></dc-import>

  <section style="background:#0e1c30; color:#fffdf7; padding:84px 48px;">
    <div style="max-width:1200px; margin:0 auto;">
      <span style="font-family:'Archivo',sans-serif; font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#c2a463;">El equipo</span>
      <h1 style="font-family:'Spectral',serif; font-weight:500; font-size:50px; line-height:1.15; margin:22px 0 20px; max-width:740px;">Abogados que responden por su nombre y por su caso.</h1>
      <p style="font-size:19px; line-height:1.7; color:#b9c2d0; font-weight:300; max-width:600px; margin:0;">Un grupo reducido de socios y asociados que trabaja directamente con cada cliente, sin intermediarios.</p>
    </div>
  </section>

  <!-- SOCIOS -->
  <section style="max-width:1200px; margin:0 auto; padding:96px 48px 64px;">
    <h2 style="font-family:'Archivo',sans-serif; font-size:12px; letter-spacing:0.28em; text-transform:uppercase; color:#9b7a3a; margin:0 0 40px; padding-bottom:18px; border-bottom:1px solid rgba(20,30,50,0.14);">Socios</h2>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:44px 36px;">
      <sc-for list="{{ socios }}" as="p" hint-placeholder-count="6">
        <div>
          <div style="aspect-ratio:3/4; background:repeating-linear-gradient(135deg,#e7e0d2,#e7e0d2 11px,#ddd5c4 11px,#ddd5c4 22px); display:flex; align-items:flex-end; padding:18px; margin-bottom:22px;">
            <span style="font-family:'Archivo',monospace; font-size:10.5px; letter-spacing:0.1em; color:#8a8170; background:rgba(255,253,247,0.82); padding:6px 10px; text-transform:uppercase;">Retrato</span>
          </div>
          <h3 style="font-family:'Spectral',serif; font-weight:600; font-size:23px; margin:0 0 5px; color:#0e1c30;">{{ p.name }}</h3>
          <div style="font-family:'Archivo',sans-serif; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:#9b7a3a; margin-bottom:14px;">{{ p.role }}</div>
          <p style="font-size:15.5px; line-height:1.65; color:#5a6270; margin:0 0 14px;">{{ p.bio }}</p>
          <a href="mailto:{{ p.email }}" style="font-family:'Archivo',sans-serif; font-size:12px; letter-spacing:0.06em; color:#0e1c30; text-decoration:none; border-bottom:1px solid #9b7a3a; padding-bottom:2px;" style-hover="color:#9b7a3a;">{{ p.email }}</a>
        </div>
      </sc-for>
    </div>
  </section>

  <!-- ASOCIADOS -->
  <section style="max-width:1200px; margin:0 auto; padding:32px 48px 96px;">
    <h2 style="font-family:'Archivo',sans-serif; font-size:12px; letter-spacing:0.28em; text-transform:uppercase; color:#9b7a3a; margin:0 0 36px; padding-bottom:18px; border-bottom:1px solid rgba(20,30,50,0.14);">Asociados principales</h2>
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:28px;">
      <sc-for list="{{ asociados }}" as="a" hint-placeholder-count="4">
        <div style="background:#fffdf7; border:1px solid rgba(20,30,50,0.1); padding:26px 24px;">
          <h3 style="font-family:'Spectral',serif; font-weight:600; font-size:19px; margin:0 0 5px; color:#0e1c30;">{{ a.name }}</h3>
          <div style="font-family:'Archivo',sans-serif; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#9b7a3a;">{{ a.role }}</div>
        </div>
      </sc-for>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}">
class Component extends DCLogic {
  renderVals() {
    return {
      socios: [
        { name: 'Jorge Ccama Quispe', role: 'Socio fundador · Corporativo', bio: 'Lidera operaciones de M&A y reestructuraciones para los principales grupos económicos del país. Más de 30 años de ejercicio.', email: 'j.ccama@ccamaypillaca.pe' },
        { name: 'Rosa Pillaca Huamán', role: 'Socia fundadora · Tributario', bio: 'Referente en controversias tributarias complejas. Ex funcionaria del Tribunal Fiscal y profesora universitaria.', email: 'r.pillaca@ccamaypillaca.pe' },
        { name: 'Augusto Ferreyros León', role: 'Socio · Litigios y Arbitraje', bio: 'Árbitro y litigante con más de 200 procesos en sede judicial y arbitral, nacional e internacional.', email: 'a.ferreyros@ccamaypillaca.pe' },
        { name: 'Lucía Pacheco Otero', role: 'Socia · Laboral', bio: 'Asesora a empresas en relaciones laborales, reestructuraciones de personal y defensa ante SUNAFIL.', email: 'l.pacheco@ccamaypillaca.pe' },
        { name: 'Diego Salaverry Mora', role: 'Socio · Penal Económico', bio: 'Diseña programas de compliance y defiende a empresas y directivos en investigaciones complejas.', email: 'd.salaverry@ccamaypillaca.pe' },
        { name: 'Verónica Quintana Ruiz', role: 'Socia · Regulatorio', bio: 'Especialista en minería, energía e infraestructura, con foco en la relación con reguladores.', email: 'v.quintana@ccamaypillaca.pe' },
      ],
      asociados: [
        { name: 'Andrés Talavera', role: 'Corporativo' },
        { name: 'María Fe Zegarra', role: 'Tributario' },
        { name: 'Joaquín Benites', role: 'Litigios' },
        { name: 'Camila Rondón', role: 'Laboral' },
        { name: 'Sebastián Cornejo', role: 'Inmobiliario' },
        { name: 'Paula Echegaray', role: 'Compliance' },
        { name: 'Renzo Figueroa', role: 'Arbitraje' },
        { name: 'Isabel Mercado', role: 'Propiedad Intelectual' },
      ],
    };
  }
}
</script>
</body>
</html>
